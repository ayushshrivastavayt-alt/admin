<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Key — HEXA</title>
    <meta name="description" content="Reset your device key">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .reset-wrap {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px; position: relative; z-index: 1;
        }
        .reset-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px; padding: 40px; width: 100%; max-width: 420px;
            backdrop-filter: blur(12px);
            box-shadow: 0 16px 64px rgba(0,0,0,0.5);
        }
        .reset-brand { text-align: center; margin-bottom: 28px; }
        .reset-brand h1 {
            font-size: 1.8rem; font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .reset-brand p { color: var(--text-muted); font-size: 0.85rem; margin-top: 6px; }
        .reset-info {
            background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.2);
            border-radius: var(--radius-sm); padding: 12px 14px;
            font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.6;
        }
        .reset-info strong { color: var(--text-primary); }
        .reset-result {
            border-radius: var(--radius-sm); padding: 12px 14px;
            font-size: 0.85rem; margin-top: 16px; display: none; line-height: 1.5;
        }
        .reset-result.success {
            background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25);
            color: #6ee7b7;
        }
        .reset-result.error {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
            color: #fca5a5;
        }
        .back-link {
            display: block; text-align: center; margin-top: 20px;
            color: var(--text-muted); font-size: 0.8rem; text-decoration: none;
        }
        .back-link:hover { color: var(--text-secondary); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="reset-wrap">
    <div class="reset-card">
        <div class="reset-brand">
            <h1>Reset Key</h1>
            <p>Reset your device binding</p>
        </div>

        <div class="reset-info">
            Enter your <strong>username</strong> to reset your device key.<br>
            After reset, you can login from a new device.<br>
            Limit: <strong>2 resets per day</strong>.
        </div>

        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" id="resetUser" class="form-input" placeholder="Enter your username" autofocus
                   onkeydown="if(event.key==='Enter')doReset()">
        </div>

        <button id="btnReset" class="btn btn-accent" style="width:100%;margin-top:8px;" onclick="doReset()">
            Reset Key
        </button>

        <div id="resetResult" class="reset-result"></div>

        <a href="/" class="back-link">← Back to Admin Panel</a>
    </div>
</div>

<script src="config/env.js"></script>
<script>
    const SUPABASE_URL = window.__ENV?.SUPABASE_URL || '';
    const SUPABASE_KEY = window.__ENV?.SUPABASE_KEY || '';

    async function doReset() {
        const username = document.getElementById('resetUser').value.trim().toLowerCase();
        const btn = document.getElementById('btnReset');
        const result = document.getElementById('resetResult');

        if (!username) {
            showResult('error', 'Please enter your username.');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Resetting...';
        result.style.display = 'none';

        try {
            const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/public_reset_hwid`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                },
                body: JSON.stringify({ p_username: username })
            });

            const data = await r.json();

            if (data.success) {
                let msg = '✓ ' + data.message;
                if (data.resets_remaining !== undefined) {
                    msg += `\n${data.resets_remaining} reset${data.resets_remaining !== 1 ? 's' : ''} remaining today.`;
                }
                showResult('success', msg);
                document.getElementById('resetUser').value = '';
            } else {
                showResult('error', '✗ ' + (data.message || 'Reset failed. Try again.'));
            }
        } catch (e) {
            showResult('error', '✗ Network error. Please try again.');
        }

        btn.disabled = false;
        btn.textContent = 'Reset Key';
    }

    function showResult(type, msg) {
        const result = document.getElementById('resetResult');
        result.className = 'reset-result ' + type;
        result.textContent = msg;
        result.style.display = 'block';
    }
</script>

</body>
</html>
